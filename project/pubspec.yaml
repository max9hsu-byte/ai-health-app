name: ai_health_flutter_advanced
description: AI Health App with local encrypted storage, OCR, Bluetooth sync, PDF export and sharing.
publish_to: 'none'
version: 1.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  path_provider: ^2.1.5
  pdf: ^3.11.1
  share_plus: ^10.0.2
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0
  flutter_blue_plus: ^1.35.5
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3

flutter:
  uses-material-design: true
