workflows:
  android-apk-debug:
    name: AI Health Android Debug APK
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      vars:
        PACKAGE_NAME: "com.example.ai_health_flutter_advanced"
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Run analyzer (optional)
        script: |
          flutter analyze || true
      - name: Build debug APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  android-apk-release:
    name: AI Health Android Release APK
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      android_signing:
        - ai_health_keystore
      vars:
        PACKAGE_NAME: "com.example.ai_health_flutter_advanced"
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Configure signing
        script: |
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
      - name: Build release APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  android-aab-release:
    name: AI Health Android Release AAB
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      android_signing:
        - ai_health_keystore
      vars:
        PACKAGE_NAME: "com.example.ai_health_flutter_advanced"
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Configure signing
        script: |
          cat >> "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
      - name: Build release AAB
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
