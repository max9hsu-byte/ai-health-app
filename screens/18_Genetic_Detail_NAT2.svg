<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
    <rect width="390" height="844" fill="#F8FAFC"/>
    <rect x="0" y="0" width="390" height="96" fill="#F8FAFC"/><text x="24" y="54" text-anchor="start" font-family="Arial, Noto Sans TC, sans-serif" font-size="22" font-weight="700" fill="#0F172A">←</text><text x="195" y="54" text-anchor="middle" font-family="Arial, Noto Sans TC, sans-serif" font-size="20" font-weight="700" fill="#0F172A">基因詳情</text><rect x="16" y="104" width="358" height="126" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/><text x="32" y="132" font-family="Arial, Noto Sans TC, sans-serif" font-size="16" font-weight="700" fill="#0F172A">肺癌</text><text x="32" y="150" text-anchor="start" font-family="Arial, Noto Sans TC, sans-serif" font-size="13" font-weight="700" fill="#475569">基因位點</text><text x="120" y="150" text-anchor="start" font-family="Arial, Noto Sans TC, sans-serif" font-size="24" font-weight="700" fill="#0F172A">NAT2</text><text x="210" y="150" text-anchor="start" font-family="Arial, Noto Sans TC, sans-serif" font-size="13" font-weight="700" fill="#475569">基因型</text><text x="282" y="150" text-anchor="start" font-family="Arial, Noto Sans TC, sans-serif" font-size="24" font-weight="700" fill="#0F172A">CC</text><text x="32" y="194" text-anchor="start" font-family="Arial, Noto Sans TC, sans-serif" font-size="13" font-weight="700" fill="#475569">潛在風險</text><rect x="120" y="174" width="52" height="30" rx="15" fill="#10B981"/><text x="146" y="195" text-anchor="middle" font-family="Arial, Noto Sans TC, sans-serif" font-size="13" font-weight="700" fill="#fff">低</text><rect x="16" y="246" width="358" height="170" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/><text x="32" y="274" font-family="Arial, Noto Sans TC, sans-serif" font-size="16" font-weight="700" fill="#0F172A">基因說明</text><text x="32" y="286" text-anchor="start" font-family="Arial, Noto Sans TC, sans-serif" font-size="14" font-weight="400" fill="#334155">NAT2 與人體對部分環境致癌物的代謝能力相關，常見於肺部與吸菸暴露風險評估。</text><text x="32" y="336" text-anchor="start" font-family="Arial, Noto Sans TC, sans-serif" font-size="14" font-weight="400" fill="#334155">若代謝能力較弱，可能增加有害物質停留時間；目前結果屬低風險，仍建議避免吸菸與空污暴露。</text><rect x="16" y="430" width="358" height="146" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/><text x="32" y="458" font-family="Arial, Noto Sans TC, sans-serif" font-size="16" font-weight="700" fill="#0F172A">AI 建議</text><text x="32" y="470" text-anchor="start" font-family="Arial, Noto Sans TC, sans-serif" font-size="14" font-weight="700" fill="#0F766E">• 避免吸菸與二手菸暴露</text><text x="32" y="504" text-anchor="start" font-family="Arial, Noto Sans TC, sans-serif" font-size="14" font-weight="700" fill="#0F766E">• 重視空氣品質與肺部檢查</text><text x="32" y="538" text-anchor="start" font-family="Arial, Noto Sans TC, sans-serif" font-size="14" font-weight="700" fill="#0F766E">• 若有家族史可搭配定期影像檢查</text><rect x="16" y="590" width="358" height="120" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/><text x="32" y="618" font-family="Arial, Noto Sans TC, sans-serif" font-size="16" font-weight="700" fill="#0F172A">關聯風險與延伸</text><text x="32" y="630" text-anchor="start" font-family="Arial, Noto Sans TC, sans-serif" font-size="14" font-weight="400" fill="#334155">可延伸查看：肺部健康、空污敏感、普遍性癌症風險。</text><rect x="0" y="770" width="390" height="74" fill="#FFFFFF" stroke="#E2E8F0"/><circle cx="40" cy="796" r="10" fill="#94A3B8"/><text x="40" y="830" text-anchor="middle" font-family="Arial, Noto Sans TC, sans-serif" font-size="11" font-weight="700" fill="#94A3B8">首頁</text><circle cx="120" cy="796" r="10" fill="#1E3A8A"/><text x="120" y="830" text-anchor="middle" font-family="Arial, Noto Sans TC, sans-serif" font-size="11" font-weight="700" fill="#1E3A8A">健康紀錄</text><circle cx="195" cy="792" r="24" fill="#1E3A8A"/><text x="195" y="800" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#fff">+</text><text x="195" y="830" text-anchor="middle" font-family="Arial, Noto Sans TC, sans-serif" font-size="11" font-weight="700" fill="#94A3B8">新增</text><circle cx="270" cy="796" r="10" fill="#94A3B8"/><text x="270" y="830" text-anchor="middle" font-family="Arial, Noto Sans TC, sans-serif" font-size="11" font-weight="700" fill="#94A3B8">分析</text><circle cx="345" cy="796" r="10" fill="#94A3B8"/><text x="345" y="830" text-anchor="middle" font-family="Arial, Noto Sans TC, sans-serif" font-size="11" font-weight="700" fill="#94A3B8">我的</text>
    </svg>